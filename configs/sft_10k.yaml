name: binder_design_100kbinder_len126

# ==============================================================================
# SFT: 100k binder dataset (protein length ~126) - Response-only loss
# Dataset folder must contain:
#   - training.csv  (columns: peptide, protein)
#   - testing.csv   (columns: peptide, protein)
# ==============================================================================

sft:
  # LoRA target modules
  # NOTE: keeping the same targets as previous runs for compatibility with existing setup.
  # If you want a *smaller* adapter, consider dropping: lm_head, wte, wpe
  lora_targets: ['c_attn', 'c_proj', 'c_fc', 'lm_head', 'wte', 'wpe']

  script_args:
    base_model_name: nferruz/ProtGPT2
    new_model_name: NanoBody-design-sft-response-only-100k-len126-r64

    # Train ONLY on protein response tokens (given peptide prompt)
    response_sft_stage: true

    # Data folder inside docker (mounted at /app/data)
    data_split_dir: /app/data
    streaming: false
    shuffle_buffer: 5000
    packing: false

    # LoRA hyperparameters (reduced from r=128)
    lora_r: 64
    lora_alpha: 128
    lora_dropout: 0.05

  training_args:
    max_seq_length: 1024

    output_dir: /app/checkpoints/SFT

    # Training schedule
    # For effective batch ~48, 100k rows is ~2.1k steps/epoch → 10k steps ≈ ~4.8 epochs.
    max_steps: 10000
    warmup_steps: 500

    # A100 40GB (proven baseline); LoRA r=64 should be a bit lighter than r=128
    per_device_train_batch_size: 12
    per_device_eval_batch_size: 24
    gradient_accumulation_steps: 4  # effective batch = 48

    # Evaluation and checkpointing
    eval_steps: 1000
    save_steps: 1000
    save_total_limit: 10
    load_best_model_at_end: true
    metric_for_best_model: eval_loss

    # Logging
    logging_dir: /app/output/logs/NanoBody-design_100k_len126_sft
    logging_steps: 10
    evaluation_strategy: steps
    save_strategy: steps
    report_to: wandb
    log_freq: 10

    # Optimization
    # 1e-3 is aggressive and can cause loss/grad-norm spikes with LoRA; start safer and sweep later.
    learning_rate: 2e-4
    lr_scheduler_type: cosine
    weight_decay: 0.01
    max_grad_norm: 1.0

    # System
    find_unused_parameters: false
    gradient_checkpointing: false  # NOTE: current sft.py raises if set true

