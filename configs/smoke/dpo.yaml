name: smoke_dpo

# Smoke-test DPO config: 10 steps over the 21,998-row Zenodo subset. Uses
# the SFT smoke checkpoint as base; produces a tiny LoRA adapter under
# /app/output/smoke/dpo/.

dpo:
  lora_targets: ['c_attn', 'c_proj', 'c_fc']

  script_args:
    sft_model_path: /app/output/smoke/sft/checkpoint-10
    new_model_name: smoke-dpo
    data_split_dir: /app/data/training_subset
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    beta: 0.1

  training_args:
    output_dir: /app/output/smoke/dpo
    max_steps: 10
    save_steps: 10
    eval_steps: 1000000
    num_train_epochs: 1
    learning_rate: 1e-5
    per_device_train_batch_size: 1
    per_device_eval_batch_size: 1
    warmup_steps: 0
    logging_dir: /app/output/smoke/dpo/logs
    logging_steps: 1
    evaluation_strategy: "no"
    load_best_model_at_end: false
    save_strategy: steps
    save_total_limit: 1
    gradient_accumulation_steps: 1
    report_to: none
    lr_scheduler_type: linear
    weight_decay: 0.0
    optimizer_type: paged_adamw_32bit
    gradient_checkpointing: false
    log_freq: 1
