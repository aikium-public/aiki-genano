name: dpo_final_gated

gdpo:
  lora_targets: ['c_attn', 'c_proj', 'c_fc', 'lm_head', 'wte', 'wpe']

  script_args:
    # DPO checkpoint-6000 (best checkpoint before degradation)
    sft_model_path: /app/checkpoints/DPO/checkpoint-6000

    # DPO adapter was trained ON TOP of SFT model
    base_model_name: /app/checkpoints/SFT

    new_model_name: NanoBody-dpo-final-gated
    merge_adapter: true

    data_split_dir: /app/data

    # LoRA parameters
    lora_r: 32
    lora_alpha: 64
    lora_dropout: 0.05

    # GDPO generation parameters
    num_generations: 16
    max_completion_length: 60
    temperature: 0.9
    top_p: 0.92
    top_k: 0
    beta: 1.0e-3

    # NBv1 literature-grounded reward set (6) — from rewards.py
    # [0] fr2_aggregation      — FR2 hydrophobicity risk (KD 1982)
    # [1] hydrophobic_patch    — consecutive hydrophobic stretches (AGGRESCAN-inspired)
    # [2] liability            — chemical liabilities (hyperbolic k=10, Robinson & Robinson)
    # [3] expression           — E. coli soluble expression (Wilkinson-Harrison 1991)
    # [4] vhh_hallmark         — VHH FR2 tetrad (Muyldermans 2013)
    # [5] scaffold_integrity   — Huber length + linker + Cys (NOT gated)
    reward_weights: [0.15, 0.20, 0.25, 0.15, 0.15, 0.10]

    # Peptide-based subsetting
    subset_seed: 42
    max_train_samples: null
    max_eval_samples: null
    max_unique_peptides_train: null
    samples_per_peptide_train: 4000
    max_unique_peptides_eval: 10
    samples_per_peptide_eval: 50

  training_args:
    output_dir: /app/output/results/dpo_final_gated
    overwrite_output_dir: false
    resume_from_checkpoint: true

    max_steps: 4000

    per_device_train_batch_size: 16
    per_device_eval_batch_size: 16
    gradient_accumulation_steps: 4

    learning_rate: 1.0e-5
    warmup_steps: 200
    lr_scheduler_type: cosine
    weight_decay: 0.05
    optim: paged_adamw_32bit

    logging_steps: 3
    report_to: wandb
    run_name: dpo_final_gated

    save_steps: 500
    save_total_limit: 10

    eval_strategy: "no"

    gradient_checkpointing: false
    bf16: false
    fp16: true

    max_grad_norm: 1.0

    epsilon: 0.1
    epsilon_high: 0.1
    loss_type: bnpo
    disable_dropout: true

    seed: 42
